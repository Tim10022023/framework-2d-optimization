version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: opt2d-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - opt2d_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opt2d-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: framework-2d-optimization-backend:latest
    container_name: opt2d-backend
    depends_on:
      - db
      - redis
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      VITE_TEACHER_PIN: ${VITE_TEACHER_PIN}
    volumes:
      - opt2d_backend_data:/app/backend/data
      - opt2d_backend_static:/app/backend/app/static
    restart: unless-stopped

  frontend:
    image: framework-2d-optimization-frontend:latest
    container_name: opt2d-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  opt2d_db_data:
  opt2d_backend_data:
  opt2d_backend_static:
