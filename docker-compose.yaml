services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opt2d-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app.db:/app/backend/app.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opt2d-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped