version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opt2d-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./data/app.db
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - opt2d_data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_PUBLIC_APP_URL: ${VITE_PUBLIC_APP_URL:-http://localhost:5173}
        VITE_TEACHER_PIN: ${VITE_TEACHER_PIN:-CHANGE_ME}
    container_name: opt2d-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  opt2d_data: